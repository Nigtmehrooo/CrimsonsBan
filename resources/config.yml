# CrimsonBann Konfiguration
plugin-name: "CrimsonBann"

# Discord Webhook Einstellungen
discord:
  enabled: true
  url: "DEINE_WEBHOOK_URL_HIER"
  username: "CrimsonBann"
  avatar-url: ""
  embeds:
    ban:
      title: "🔨 Spieler gebannt"
      color: 14495300
      thumbnail-url: ""
    tempban:
      title: "⏰ Zeitweiser Bann"
      color: 16776960

# Bann-Templates für schnelle Gründe
ban-templates:
  - name: "Hacking"
    reason: "Verwendung von verbotenen Hacks/Cheats"
    default-duration: "30d"
  - name: "Spam"
    reason: "Spam im Chat"
    default-duration: "1d"
  - name: "Beleidigung"
    reason: "Beleidigung von Spielern"
    default-duration: "7d"
  - name: "Werbung"
    reason: "Werbung für andere Server"
    default-duration: "perm"

# Nachrichten
messages:
  prefix: "&c[CrimsonBann]&r "
  ban-success: "&aSpieler &e{player} &awurde erfolgreich gebannt."
  tempban-success: "&aSpieler &e{player} &awurde für &e{duration} &agebannt."
  unban-success: "&aSpieler &e{player} &awurde erfolgreich entbannt."
  ipban-success: "&aSpieler &e{player} &aund seine IP wurden gebannt."
  player-not-found: "&cSpieler nicht gefunden."
  already-banned: "&cDieser Spieler ist bereits gebannt."
  not-banned: "&cDieser Spieler ist nicht gebannt."
  no-permission: "&cDu hast keine Berechtigung für diesen Befehl."
  invalid-duration: "&cUngültige Dauer. Nutze z.B. 30m, 12h, 7d oder permanent."
  multi-account-detected: "&c⚠️ Multi-Account Detection: Spieler {player} versucht mit IP {ip} beizutreten."
  too-many-accounts: "&c⚠️ Zu viele Accounts von IP {ip}: {count} Accounts."
    evidence-report: "&a📋 Evidence Report für {player} erstellt: {file}"
  admin-display: "&c[CrimsonBann] &f... &c[{duration}]"

# Ban Screen Einstellungen
ban-screen:
  title: "&4&lCrimsonBann"
  subtitle: "&cDu wurdest vom Server gebannt."
  lines:
    - "&7Gebannt von: &f{bannedBy}"
    - "&7Grund: &f{reason}"
    - "&7Dauer: &f{duration}"
    - ""
    - "&7Entbannung per Ticket:"
    - "&cdiscord.gg/dein-server"
